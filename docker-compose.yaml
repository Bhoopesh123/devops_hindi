services:
  gemini-chat:
    build: .
    image: gemini-assistant-2026
    container_name: gemini-chat-app
    ports:
      - "8080:8080"
    # These two lines are the fix for EOFError:
    tty: true
    stdin_open: true
    environment:
      - GEMINI_API_KEY=xxxxx
    # Optional: ensure you can see output immediately
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"